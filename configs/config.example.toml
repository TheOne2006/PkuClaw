[app]
name = "PKU Course Bot"
data_dir = "data"
timezone = "Asia/Shanghai"

[feishu]
app_id = "cli_xxx"
app_secret_env = "FEISHU_APP_SECRET"
event_mode = "websocket"

[pku3b]
bin = "crates/pku3b/target/debug/pku3b"
source_dir = "crates/pku3b"

[monitor]
scan_interval_seconds = 900
enable_assignments = true
enable_announcements = true
enable_replays = true
enable_grades = false
