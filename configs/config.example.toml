[app]
name = "PKU Course Bot"
data_dir = "data"
runtime_config_dir = "configs/runtime"
timezone = "Asia/Shanghai"

[feishu]
app_id = "cli_xxx"
app_secret_env = "FEISHU_APP_SECRET"
event_mode = "websocket"

[agent]
provider = "codex"

[codex]
bin = "codex"
sandbox = "workspace-write"
model = "gpt-5.5"
timeout_seconds = 1800
max_concurrent_runs = 1

[mcp]
host = "127.0.0.1"
port = 8765
